<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>QuoteFlow — Professional IT Quotation Software</title>
    <meta name="description" content="QuoteFlow is the all-in-one quotation platform for IT service providers. Create, send, and track professional quotes in minutes. Start free today." />
    <meta name="keywords" content="IT quotation software, quote management, IT services quotes, professional quotations, invoice management" />
    <meta name="author" content="QuoteFlow" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://quoteflow.app/marketing/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quoteflow.app/marketing/" />
    <meta property="og:title" content="QuoteFlow — Professional IT Quotation Software" />
    <meta property="og:description" content="Create, send, and track professional IT service quotes in minutes. Streamline your sales process with QuoteFlow." />
    <meta property="og:image" content="https://quoteflow.app/og-image.png" />
    <meta property="og:site_name" content="QuoteFlow" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@quoteflow" />
    <meta name="twitter:title" content="QuoteFlow — Professional IT Quotation Software" />
    <meta name="twitter:description" content="Create, send, and track professional IT service quotes in minutes." />
    <meta name="twitter:image" content="https://quoteflow.app/og-image.png" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "QuoteFlow",
      "url": "https://quoteflow.app/marketing/",
      "description": "Professional IT quotation software for service providers",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://quoteflow.app/marketing/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "QuoteFlow",
      "url": "https://quoteflow.app",
      "logo": "https://quoteflow.app/favicon.svg",
      "description": "Professional IT quotation management platform",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@quoteflow.app"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "QuoteFlow",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "All-in-one quotation platform for IT service providers",
      "offers": [
        {
          "@type": "Offer",
          "name": "Daily Plan",
          "price": "2.99",
          "priceCurrency": "USD",
          "billingDuration": "P1D"
        },
        {
          "@type": "Offer",
          "name": "Weekly Plan",
          "price": "9.99",
          "priceCurrency": "USD",
          "billingDuration": "P1W"
        },
        {
          "@type": "Offer",
          "name": "Monthly Plan",
          "price": "29.99",
          "priceCurrency": "USD",
          "billingDuration": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Yearly Plan",
          "price": "199.99",
          "priceCurrency": "USD",
          "billingDuration": "P1Y"
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is QuoteFlow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "QuoteFlow is a professional quotation management platform designed specifically for IT service providers. It lets you create, send, and track quotes with line items, taxes, discounts, and PDF exports."
          }
        },
        {
          "@type": "Question",
          "name": "Can I try QuoteFlow before subscribing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! QuoteFlow offers a daily plan so you can try the full product for less than a cup of coffee. No long-term commitment required."
          }
        },
        {
          "@type": "Question",
          "name": "How do I send quotes to clients?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Once you create a quote in QuoteFlow, you can export it as a professional PDF and share it directly with your client. Quotes include your company branding, line items, tax calculations, and payment links."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my subscription at any time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. You can cancel your QuoteFlow subscription at any time from your account settings. There are no cancellation fees or lock-in periods."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. QuoteFlow uses industry-standard encryption and secure cloud infrastructure. Your client data and quotes are protected and never shared with third parties."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
