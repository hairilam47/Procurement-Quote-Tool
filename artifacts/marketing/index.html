<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>KuotFlow | Professional IT Quotation Software for MSPs</title>
    <meta name="description" content="KuotFlow is the all-in-one quotation platform for IT service providers. Create, send, and track professional PDF quotes in minutes. No more messy Word docs. Start free today." />
    <meta name="keywords" content="IT quotation software, quote management, IT services quotes, professional quotations, invoice management" />
    <meta name="author" content="KuotFlow" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="canonical" href="https://kuotflow.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kuotflow.com/" />
    <meta property="og:title" content="KuotFlow | Professional IT Quotation Software for MSPs" />
    <meta property="og:description" content="Create, send, and track professional IT service quotes in minutes. Streamline your sales process with KuotFlow." />
    <meta property="og:image" content="https://kuotflow.com/opengraph.jpg" />
    <meta property="og:site_name" content="KuotFlow" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kuotflow" />
    <meta name="twitter:title" content="KuotFlow | Professional IT Quotation Software for MSPs" />
    <meta name="twitter:description" content="Create, send, and track professional IT service quotes in minutes." />
    <meta name="twitter:image" content="https://kuotflow.com/opengraph.jpg" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "KuotFlow",
      "url": "https://kuotflow.com/",
      "description": "Professional IT quotation software for service providers",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kuotflow.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "KuotFlow",
      "url": "https://kuotflow.com",
      "logo": "https://kuotflow.com/favicon.svg",
      "description": "Professional IT quotation management platform",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@kuotflow.com"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "KuotFlow",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "All-in-one quotation platform for IT service providers",
      "offers": [
        {
          "@type": "Offer",
          "name": "Daily Plan",
          "price": "2.99",
          "priceCurrency": "USD",
          "billingDuration": "P1D"
        },
        {
          "@type": "Offer",
          "name": "Weekly Plan",
          "price": "9.99",
          "priceCurrency": "USD",
          "billingDuration": "P1W"
        },
        {
          "@type": "Offer",
          "name": "Monthly Plan",
          "price": "29.99",
          "priceCurrency": "USD",
          "billingDuration": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Yearly Plan",
          "price": "199.99",
          "priceCurrency": "USD",
          "billingDuration": "P1Y"
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQPage — matches the FAQ accordion in home.tsx exactly -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does KuotFlow compare to Word or Excel for quoting?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Word and Excel are generic tools — they require manual formatting, offer no tracking, and are easy to lose. KuotFlow is purpose-built: every quote is structured, branded, PDF-ready, and tracked from the moment you send it. You spend minutes, not hours."
          }
        },
        {
          "@type": "Question",
          "name": "Can I white-label the PDF quotes with my own branding?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All KuotFlow Pro plans let you add your company logo, brand colours, and custom footer text to every PDF. You can remove the KuotFlow watermark and present fully branded documents to your clients."
          }
        },
        {
          "@type": "Question",
          "name": "What billing options are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "KuotFlow offers flexible billing: Daily ($2.99), Weekly ($9.99), Monthly ($29.99), or Yearly ($199.99). The yearly plan saves you around 44% compared to monthly billing. You can upgrade, downgrade, or cancel at any time from your account settings."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free trial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "KuotFlow offers a generous free-tier to get you started. You can create your first quotes and explore the platform at no cost. When you're ready to unlock unlimited quotes, PDF generation, and client management, simply upgrade to a paid plan."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get started?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Click 'Start for free', create your account, and you'll be guided through setting up your company profile. You can create your first professional quote in under 5 minutes — no credit card required to begin."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my subscription at any time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. There are no long-term contracts. You can cancel your subscription at any time from your billing settings and you won't be charged for the next billing period. Your data remains accessible until the end of your current billing cycle."
          }
        }
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
